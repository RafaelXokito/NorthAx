services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: northax
      POSTGRES_PASSWORD: northax
      POSTGRES_DB: northax
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northax"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://northax:northax@db:5432/northax
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: ["python", "-m", "app.jobs.worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://northax:northax@db:5432/northax
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
