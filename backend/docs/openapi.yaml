- name: readiness
  description: Deterministic readiness score + cached AI explanation (§7.4).
- name: preferences
  description: Domains, frequency, and muscle-group split (§7.5).
- name: plan
  description: Weekly training plans (§7.6).
- name: activities
  description: Manual + Garmin-synced activities (§7.7).
- name: intervals
  description: intervals.icu OAuth connection + sync + workout push (§7.8 / §9).
- name: ai
  description: Coach chat (SSE), session suggestion, strength generation (§7.9–7.10).
- name: meta
  description: Health and service metadata.
