openapi: 3.1.0
info:
  title: NorthAx API
  description: "\nNorthAx training-OS backend.\n\nTwo layers (see BACKEND_SPEC.md\
    \ §1):\n\n* **Deterministic engines** — readiness scoring, weekly plan generation,\
    \ and\n  strength-session assembly. Ported from the iOS Swift engines; identical\
    \ inputs\n  produce identical outputs.\n* **AI explanation layer** — Claude (via\
    \ the Hermes agent CLI) wraps each\n  deterministic output with a natural-language\
    \ explanation, coaching note, and\n  chat. The AI never overrides the deterministic\
    \ score; it only explains it.\n\n**Auth.** All routes except `POST /auth/apple`,\
    \ `POST /auth/refresh`, and\n`GET /intervals/callback` require `Authorization:\
    \ Bearer <accessToken>`.\n\n**Errors.** Every error returns the envelope\n`{ \"\
    error\": { \"code\", \"message\", \"status\" } }` (§11).\n"
  contact:
    name: NorthAx
    email: api@northax.app
  license:
    name: Proprietary
  version: 0.1.0
servers:
- url: https://api.northax.app/v1
  description: Production
- url: http://localhost:8080/v1
  description: Local development
